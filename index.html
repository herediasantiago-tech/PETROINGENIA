<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página Web</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      color: #333;
      font-size: 3rem;
    }

    p {
      color: #666;
      font-size: 1.2rem;
    }

    .boton {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #0077ff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .boton:hover {
      background: #005ad1;
    }
  </style>
</head>

<body>

  <h1>¡Hola Mundo!</h1>

  <p>Mi página web ya está publicada en GitHub Pages 🚀</p>

  <a class="boton" href="https://github.com">
    Ir a GitHub
  </a>

</body>
</html>
